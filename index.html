<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Berkant Ulusoy | DevOps Engineer</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Devicon & FontAwesome Logoları -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* --- HEADER BÖLÜMÜ --- */
        header {
            text-align: center;
            padding: 100px 20px 50px;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* --- YETENEKLER BÖLÜMÜ --- */
        .skills-section {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        .skills-section h2 {
            font-size: 2rem;
            margin-bottom: 40px;
            color: var(--text-main);
        }

        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        .skill-card {
            background-color: var(--card-bg);
            padding: 30px 20px;
            border-radius: 16px;
            width: 150px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .skill-card i {
            font-size: 4rem;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .skill-card h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        /* Hover Efektleri (Havalı Parlama) */
        .skill-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.4);
        }

        .skill-card:hover h3 {
            color: var(--text-main);
        }

        /* Logolara özel hover renkleri */
        .skill-card:hover .devicon-docker-plain { color: #2496ed; }
        .skill-card:hover .devicon-kubernetes-plain { color: #326ce5; }
        .skill-card:hover .devicon-linux-plain { color: #fcc624; }
        .skill-card:hover .devicon-git-plain { color: #f05032; }
        .skill-card:hover .fa-server { color: #10b981; } /* Coolify için yeşil ton */

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Ali Berkant Ulusoy</h1>
        <p>Junior Developer & DevOps Engineer</p>
    </header>

    <section class="skills-section">
        <h2>Yeteneklerim</h2>
        
        <div class="skills-grid">
            
            <!-- Docker -->
            <div class="skill-card">
                <i class="devicon-docker-plain colored"></i>
                <h3>Docker</h3>
            </div>

            <!-- Kubernetes -->
            <div class="skill-card">
                <i class="devicon-kubernetes-plain colored"></i>
                <h3>Kubernetes</h3>
            </div>

            <!-- Linux -->
            <div class="skill-card">
                <i class="devicon-linux-plain"></i>
                <h3>Linux</h3>
            </div>

            <!-- Git -->
            <div class="skill-card">
                <i class="devicon-git-plain colored"></i>
                <h3>Git</h3>
            </div>

            <!-- Coolify -->
            <div class="skill-card">
                <i class="fa-solid fa-server" style="color: #94a3b8;"></i>
                <h3>Coolify</h3>
            </div>

        </div>
    </section>

    <footer>
        <p> Kodla ve tutkuyla tasarlandı. © 2026</p>
    </footer>

</body>
</html>
